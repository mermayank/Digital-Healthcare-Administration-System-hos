openapi: 3.0.3
info:
  title: Insurance API
  description: Insurance module API for Digital Healthcare Administration System
  version: 1.0.0
servers:
  - url: http://localhost:3000/api/insurance
paths:
  /health:
    get:
      summary: Health check endpoint
      tags:
        - Health
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "ok"
                  timestamp:
                    type: string
                    format: date-time
                  database:
                    type: string
                    example: "connected"
  /providers:
    get:
      summary: Get insurance providers
      tags:
        - Providers
      parameters:
        - name: isActive
          in: query
          schema:
            type: string
            enum: ["true", "false"]
          description: Filter by active status
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  providers:
                    type: array
                    items:
                      $ref: "#/components/schemas/InsuranceProvider"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    post:
      summary: Create insurance provider
      tags:
        - Providers
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
              properties:
                name:
                  type: string
                description:
                  type: string
                website:
                  type: string
                phone:
                  type: string
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  provider:
                    $ref: "#/components/schemas/InsuranceProvider"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /cards:
    get:
      summary: Get insurance cards
      tags:
        - Cards
      parameters:
        - name: patientId
          in: query
          schema:
            type: string
          description: Filter by patient ID (admin only)
        - name: status
          in: query
          schema:
            $ref: "#/components/schemas/InsuranceStatus"
          description: Filter by status
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  cards:
                    type: array
                    items:
                      $ref: "#/components/schemas/InsuranceCard"
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    post:
      summary: Create insurance card
      tags:
        - Cards
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - providerId
                - cardNumber
                - holderName
                - coverageAmount
              properties:
                providerId:
                  type: string
                cardNumber:
                  type: string
                holderName:
                  type: string
                policyNumber:
                  type: string
                expiryDate:
                  type: string
                  format: date
                coverageAmount:
                  type: number
                documentUrl:
                  type: string
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  card:
                    $ref: "#/components/schemas/InsuranceCard"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /cards/{id}:
    get:
      summary: Get insurance card by ID
      tags:
        - Cards
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          example: "card1"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  card:
                    $ref: "#/components/schemas/InsuranceCard"
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    put:
      summary: Update insurance card
      tags:
        - Cards
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          example: "card1"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                documentUrl:
                  type: string
                status:
                  $ref: "#/components/schemas/InsuranceStatus"
                rejectionReason:
                  type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  card:
                    $ref: "#/components/schemas/InsuranceCard"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      summary: Delete insurance card
      tags:
        - Cards
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          example: "card1"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /coverage:
    get:
      summary: Get coverage rules
      tags:
        - Coverage
      parameters:
        - name: providerId
          in: query
          schema:
            type: string
        - name: isActive
          in: query
          schema:
            type: string
            enum: ["true", "false"]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  rules:
                    type: array
                    items:
                      $ref: "#/components/schemas/CoverageRule"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    post:
      summary: Create coverage rule
      tags:
        - Coverage
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - providerId
                - serviceName
                - coveragePercent
              properties:
                providerId:
                  type: string
                serviceName:
                  type: string
                coveragePercent:
                  type: number
                maxAmount:
                  type: number
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  rule:
                    $ref: "#/components/schemas/CoverageRule"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /coverage/{id}:
    get:
      summary: Get coverage rule by ID
      tags:
        - Coverage
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          example: "rule1"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  rule:
                    $ref: "#/components/schemas/CoverageRule"
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    put:
      summary: Update coverage rule
      tags:
        - Coverage
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          example: "rule1"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                serviceName:
                  type: string
                coveragePercent:
                  type: number
                maxAmount:
                  type: number
                isActive:
                  type: boolean
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  rule:
                    $ref: "#/components/schemas/CoverageRule"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      summary: Delete coverage rule
      tags:
        - Coverage
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          example: "rule1"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /claims:
    get:
      summary: Get insurance claims
      tags:
        - Claims
      parameters:
        - name: cardId
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            $ref: "#/components/schemas/ClaimStatus"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  claims:
                    type: array
                    items:
                      $ref: "#/components/schemas/InsuranceClaim"
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    post:
      summary: Create insurance claim
      tags:
        - Claims
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - cardId
                - serviceName
                - claimedAmount
              properties:
                cardId:
                  type: string
                appointmentId:
                  type: string
                serviceName:
                  type: string
                claimedAmount:
                  type: number
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  claim:
                    $ref: "#/components/schemas/InsuranceClaim"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /claims/{id}:
    get:
      summary: Get insurance claim by ID
      tags:
        - Claims
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          example: "claim1"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  claim:
                    $ref: "#/components/schemas/InsuranceClaim"
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    put:
      summary: Update insurance claim
      tags:
        - Claims
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          example: "claim1"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  $ref: "#/components/schemas/ClaimStatus"
                approvedAmount:
                  type: number
                rejectionReason:
                  type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  claim:
                    $ref: "#/components/schemas/InsuranceClaim"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
components:
  schemas:
    Error:
      type: object
      properties:
        error:
          type: string
    InsuranceStatus:
      type: string
      enum:
        - PENDING
        - APPROVED
        - REJECTED
        - EXPIRED
    ClaimStatus:
      type: string
      enum:
        - PENDING
        - APPROVED
        - REJECTED
        - PROCESSED
    InsuranceProvider:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
          nullable: true
        website:
          type: string
          nullable: true
        phone:
          type: string
          nullable: true
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    InsuranceCard:
      type: object
      properties:
        id:
          type: string
        patientId:
          type: string
        providerId:
          type: string
        cardNumber:
          type: string
        holderName:
          type: string
        policyNumber:
          type: string
          nullable: true
        expiryDate:
          type: string
          format: date-time
          nullable: true
        coverageAmount:
          type: number
        remainingBalance:
          type: number
        documentUrl:
          type: string
          nullable: true
        status:
          $ref: "#/components/schemas/InsuranceStatus"
        rejectionReason:
          type: string
          nullable: true
        verifiedById:
          type: string
          nullable: true
        verifiedAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    CoverageRule:
      type: object
      properties:
        id:
          type: string
        providerId:
          type: string
        serviceName:
          type: string
        coveragePercent:
          type: number
        maxAmount:
          type: number
          nullable: true
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    InsuranceClaim:
      type: object
      properties:
        id:
          type: string
        cardId:
          type: string
        appointmentId:
          type: string
          nullable: true
        serviceName:
          type: string
        claimedAmount:
          type: number
        approvedAmount:
          type: number
          nullable: true
        status:
          $ref: "#/components/schemas/ClaimStatus"
        rejectionReason:
          type: string
          nullable: true
        processedById:
          type: string
          nullable: true
        processedAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
