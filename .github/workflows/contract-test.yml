name: CI/CD

on: [push, pull_request]

jobs:
  specmatic-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install dependencies
        run: npm ci

      - name: Create .env file
        run: echo 'DATABASE_URL=file:./dev.db' > .env

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Apply database schema
        run: npx prisma db push

      - name: Seed test data
        run: npx prisma db seed

      - name: Build application
        run: npm run build

      - name: Start dev server in background
        run: npm run dev -- --hostname 0.0.0.0 > /tmp/hms.log 2>&1 &

      - name: Wait for service to start
        run: |
          for i in {1..30}; do
            if curl -sSf http://127.0.0.1:3000/api/insurance/health > /dev/null; then
              echo 'Server is up!'
              exit 0
            fi
            echo "Waiting for server... ($i/30)"
            sleep 2
          done
          echo 'Server failed to start!'
          cat /tmp/hms.log
          exit 1

      - name: Wait for actuator endpoint
        run: |
          for i in {1..30}; do
            if curl -sSf http://127.0.0.1:3000/api/actuator/mappings > /dev/null; then
              echo 'Actuator endpoint is available!'
              exit 0
            fi
            echo "Waiting for actuator endpoint... ($i/30)"
            sleep 2
          done
          echo 'Actuator endpoint failed to start!'
          cat /tmp/hms.log
          exit 1

      - name: Run Specmatic tests
        run: npm run test:specmatic

      - name: Upload Specmatic report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: specmatic-report
          path: build/reports/specmatic
          if-no-files-found: warn
          retention-days: 30